  { name: "Kolkata", lon: 88.36, lat: 22.57, major: true },
  { name: "Vizag", lon: 83.30, lat: 17.69, major: true },
  // Smaller cities along routes
  { name: "Pune", lon: 73.86, lat: 18.52 },
  { name: "Bhubaneswar", lon: 85.83, lat: 20.30 },
  { name: "Vijayawada", lon: 80.65, lat: 16.51 },
  { name: "Puri", lon: 85.83, lat: 19.81 },
  { name: "Hampi", lon: 76.46, lat: 15.33 },
  { name: "Kadapa", lon: 78.82, lat: 14.47 },
  { name: "Anantapur", lon: 77.60, lat: 14.68 },
  { name: "Ongole", lon: 80.05, lat: 15.50 },
  { name: "Rajahmundry", lon: 81.78, lat: 17.00 },
  { name: "Cuttack", lon: 85.88, lat: 20.46 },
  { name: "Nellore", lon: 79.99, lat: 14.44 },
  { name: "Hospet", lon: 76.39, lat: 15.27 },
  { name: "Solapur", lon: 75.92, lat: 17.68 },
  // Nearby major cities for geographic context (not on routes)
  { name: "Delhi", lon: 77.21, lat: 28.61, offRoute: true },
  { name: "Ahmedabad", lon: 72.57, lat: 23.02, offRoute: true },
  { name: "Nagpur", lon: 79.09, lat: 21.15, offRoute: true },
  { name: "Goa", lon: 73.83, lat: 15.30, offRoute: true },
  { name: "Kochi", lon: 76.27, lat: 9.93, offRoute: true },
  { name: "Lucknow", lon: 80.95, lat: 26.85, offRoute: true },
];

function EVRouteMap({ liveLocation }) {
  const svgRef = useRef(null);
  const [dims, setDims] = useState({ w: 900, h: 700 });
  const [selected, setSelected] = useState(null);
  const [hovered, setHovered] = useState(null);
  const [transform, setTransform] = useState({ k: 1, x: 0, y: 0 });
  const [tooltip, setTooltip] = useState(null);

  // Responsive sizing
  useEffect(() => {
    const resize = () => {
      setDims({ w: window.innerWidth, h: window.innerHeight - 52 });
    };
    resize();
    window.addEventListener("resize", resize);
    return () => window.removeEventListener("resize", resize);
  }, []);

  // Projection centered on the routes
  const projection = useMemo(() => {
    const allPts = ROUTES.flatMap(r => r.coords);
    const lonMin = Math.min(...allPts.map(c => c[0]));
    const lonMax = Math.max(...allPts.map(c => c[0]));
    const latMin = Math.min(...allPts.map(c => c[1]));
    const latMax = Math.max(...allPts.map(c => c[1]));
    const centerLon = (lonMin + lonMax) / 2;
    const centerLat = (latMin + latMax) / 2;

    const padding = 60;
    const proj = d3.geoMercator()
      .center([centerLon, centerLat])
      .fitExtent(
        [[padding, padding], [dims.w - 240, dims.h - padding]],
        { type: "MultiPoint", coordinates: allPts }
      );
    return proj;
  }, [dims]);

  const pathGen = useMemo(() => d3.geoPath(projection), [projection]);

  const indiaPath = useMemo(() => pathGen(INDIA_OUTLINE), [pathGen]);

  // Zoom/pan with d3-zoom
  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    const zoom = d3.zoom()
      .scaleExtent([0.5, 20])
      .on("zoom", (e) => {
        setTransform({ k: e.transform.k, x: e.transform.x, y: e.transform.y });
      });
    svg.call(zoom);
    return () => svg.on(".zoom", null);
  }, []);

  const handleRouteClick = (idx, e) => {
    e.stopPropagation();
    setSelected(selected === idx ? null : idx);
  };

  const handleRouteHover = (idx, e) => {
    setHovered(idx);
    const r = ROUTES[idx];
    setTooltip({ x: e.clientX, y: e.clientY, name: r.name, dist: r.dist, charges: r.charges, eff: r.eff });
  };

  // Render routes as SVG paths
  const routePaths = useMemo(() => {
    return ROUTES.map((r, i) => {
      const lineCoords = r.coords.map(c => projection(c));
      if (lineCoords.some(c => !c)) return null;
      const d = d3.line()(lineCoords);
      return { d, color: r.color, idx: i, name: r.name };
    }).filter(Boolean);
  }, [projection]);

  // City positions
  const cityPositions = useMemo(() => {
    return CITIES.map(c => {
      const [x, y] = projection([c.lon, c.lat]) || [0, 0];
      return { ...c, x, y };
    });
  }, [projection]);

  // Start/end markers for each route
  const markers = useMemo(() => {
    return ROUTES.map((r, i) => {
      const start = projection(r.coords[0]);
      const end = projection(r.coords[r.coords.length - 1]);
      return { start, end, color: r.color, idx: i };
    });
  }, [projection]);

  const totalDist = ROUTES.reduce((s, r) => s + r.dist, 0);
  const totalCharges = ROUTES.reduce((s, r) => s + r.charges, 0);

  return (
    <div style={{ background: "#0a0b0f", width: "100vw", height: "100vh", overflow: "hidden", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif", color: "#e5e7eb", position: "relative" }}>
      {/* Header */}
      <div style={{ background: "#111827", borderBottom: "1px solid #1f2937", padding: "10px 20px", display: "flex", alignItems: "center", gap: 10, height: 48 }}>
        <span style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>Tata Nexon EV — Route Map</span>
        <span style={{ background: "#2563eb", color: "#fff", fontSize: 10, padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>29 kWh</span>
        <span style={{ color: "#6b7280", fontSize: 11, marginLeft: 6 }}>Dec 2025 — Mar 2026</span>
      </div>

      {/* Map SVG */}
      <svg
        ref={svgRef}
        width={dims.w}
        height={dims.h - 48}
        style={{ cursor: "grab", background: "#0a0b0f" }}
        onClick={() => setSelected(null)}
      >
        <defs>
          <filter id="carGlow">
            <feDropShadow dx="0" dy="0" stdDeviation="2" floodColor="#3b82f6" floodOpacity="0.6" />
          </filter>
        </defs>
        <g transform={`translate(${transform.x},${transform.y}) scale(${transform.k})`}>
          {/* Subtle grid lines */}
          {[72, 74, 76, 78, 80, 82, 84, 86, 88, 90].map(lon => {
            const p1 = projection([lon, 8]);
            const p2 = projection([lon, 28]);
            return p1 && p2 ? <line key={`lon${lon}`} x1={p1[0]} y1={p1[1]} x2={p2[0]} y2={p2[1]} stroke="#0f1218" strokeWidth={0.5 / transform.k} strokeDasharray={`${4/transform.k} ${8/transform.k}`} /> : null;
          })}
          {[10, 12, 14, 16, 18, 20, 22, 24, 26].map(lat => {
            const p1 = projection([70, lat]);
            const p2 = projection([92, lat]);
            return p1 && p2 ? <line key={`lat${lat}`} x1={p1[0]} y1={p1[1]} x2={p2[0]} y2={p2[1]} stroke="#0f1218" strokeWidth={0.5 / transform.k} strokeDasharray={`${4/transform.k} ${8/transform.k}`} /> : null;
          })}

          {/* India outline */}
          {indiaPath && <path d={indiaPath} fill="none" stroke="#1e293b" strokeWidth={1.2 / transform.k} opacity={0.7} />}

          {/* City markers */}
          {cityPositions.map((c, i) => {
            const isMajor = c.major;
            const isOff = c.offRoute;
            return (
              <g key={i} opacity={isOff ? 0.4 : 1}>
                <circle cx={c.x} cy={c.y} r={(isMajor ? 3.5 : 2) / transform.k} fill={isMajor ? "#4b5563" : "#2a2f3a"} stroke={isMajor ? "#6b7280" : "none"} strokeWidth={0.5 / transform.k} />
                <text x={c.x + (isMajor ? 6 : 4) / transform.k} y={c.y + 3 / transform.k} fill={isMajor ? "#9ca3af" : "#4b5563"} fontSize={(isMajor ? 10 : 8) / transform.k} fontWeight={isMajor ? 600 : 400}>{c.name}</text>
              </g>
            );
          })}

          {/* Route polylines */}
          {routePaths.map((rp) => {
            const isSelected = selected === rp.idx;
            const isDimmed = selected !== null && !isSelected;
            return (
              <path
                key={rp.idx}
                d={rp.d}
                fill="none"
                stroke={rp.color}
                strokeWidth={(isSelected ? 4 : hovered === rp.idx ? 3.5 : 2.5) / transform.k}
                strokeLinecap="round"
                strokeLinejoin="round"
                opacity={isDimmed ? 0.12 : isSelected ? 1 : 0.85}
                style={{ cursor: "pointer", transition: "opacity 0.2s" }}
                onClick={(e) => handleRouteClick(rp.idx, e)}
                onMouseEnter={(e) => handleRouteHover(rp.idx, e)}
                onMouseMove={(e) => setTooltip(t => t ? { ...t, x: e.clientX, y: e.clientY } : t)}
                onMouseLeave={() => { setHovered(null); setTooltip(null); }}
              />
            );
          })}

          {/* Start/end dots */}
          {markers.map((m, i) => {
            const isDimmed = selected !== null && selected !== m.idx;
            if (isDimmed) return null;
            return (
              <g key={`m${i}`}>
                {m.start && <circle cx={m.start[0]} cy={m.start[1]} r={3.5 / transform.k} fill={m.color} stroke="#0a0b0f" strokeWidth={1 / transform.k} />}
                {m.end && <circle cx={m.end[0]} cy={m.end[1]} r={3.5 / transform.k} fill={m.color} stroke="#fff" strokeWidth={1.2 / transform.k} />}
              </g>
            );
          })}
          {/* Live location - Nexon EV icon */}
          {liveLocation && (() => {
            const pos = projection([liveLocation.longitude, liveLocation.latitude]);
            if (!pos) return null;
            const iconScale = 0.8 / transform.k;
            const heading = liveLocation.heading || 0;
            return (
              <g transform={`translate(${pos[0]}, ${pos[1]})`}>
                {/* Pulsing location ring */}
                <circle r={20 / transform.k} fill="#3b82f6" opacity={0.12}>
                  <animate attributeName="r" values={`${20/transform.k};${32/transform.k};${20/transform.k}`} dur="2s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0.15;0.05;0.15" dur="2s" repeatCount="indefinite" />
                </circle>
                {/* 2022 Tata Nexon EV Prime (White) — accurate side profile */}
                <g transform={`scale(${iconScale}) translate(-30, -14)`}>
                  {/* Black lower body cladding — thick plastic trim (Nexon signature) */}
                  <path d="M 5 20 L 5 22 C 5 22.8 5.5 23.5 6 23.5 L 10 23.5 C 10.5 23.5 11 23 11 22 L 11 21 L 21 21 L 21 22 C 21 23 21.5 23.5 22 23.5 L 26 23.5 C 26.5 23.5 27 22.8 27 22 L 27 20.5 L 38 20.5 L 38 22 C 38 23 38.5 23.5 39 23.5 L 43 23.5 C 43.5 23.5 44 23 44 22 L 44 21 L 53 21 L 53 22 C 53 23 53.5 23.5 54 23.5 L 58 23.5 C 58.5 23.5 59 22.8 59 22 L 59 20.5 L 60 20 L 60 19.5 L 5 19.5 Z" fill="#1e293b" />
                  {/* Main body — white shell (taller, chunkier SUV proportions) */}
                  <path d="M 3 18 L 2.5 16.5 L 2 15 L 2.5 13 L 4 11.5 L 6 10.5 L 8 10 L 10 9 L 14 7.5 L 18 6.5 L 21 5.5 L 24 4 Q 27 2.5 32 1.5 L 38 1 L 44 1.5 Q 47 2 49 3 L 51 4.5 L 53 6.5 L 55 8 L 57 9.5 L 59 11 L 60.5 13 L 61 15 L 61 17 L 60.5 18.5 L 60 19.5 L 5 19.5 L 4 19 Z" fill="#ffffff" filter="url(#carGlow)" />
                  {/* Floating roof — dark (Nexon signature black roof) */}
                  <path d="M 26 3.5 Q 29 2 33 1.2 L 39 0.8 L 44 1.2 Q 47 1.8 49 3 L 50.5 4.5 L 51.5 6 L 50 6 L 48.5 4.5 L 46 3 L 42 2 L 36 1.8 L 31 2.2 L 27 3.5 Z" fill="#1e293b" />
                  {/* Roof rails — silver bars */}
                  <line x1="29" y1="1.5" x2="47" y2="1.8" stroke="#94a3b8" strokeWidth="0.7" strokeLinecap="round" />
                  {/* Dark C-pillar (floating roof effect) */}
                  <path d="M 49 3 L 51.5 6 L 53 8 L 54 9.5 L 52.5 10 L 51 8.5 L 49.5 6.5 L 48 4.5 Z" fill="#1e293b" opacity="0.9" />
                  {/* A-pillar */}
                  <path d="M 21 5.5 L 25 3.5" stroke="#e2e8f0" strokeWidth="0.7" fill="none" />
                  {/* Front windshield — steeply raked */}
                  <path d="M 21 5.5 L 25 3.5 L 27 2.8 L 27 5.5 L 22 7.5 Z" fill="#334155" opacity="0.85" />
                  {/* Front side window — triangular quarter glass + main */}
                  <path d="M 22 7.5 L 27 5.5 L 31 5.2 L 31 9.5 L 23 10 Z" fill="#334155" opacity="0.8" />
                  {/* Rear side window — slopes down (coupe-SUV style) */}
                  <path d="M 32 5.2 L 43 4 L 48 4.5 L 49.5 6.5 L 51 8.5 L 52.5 10 L 32 10 Z" fill="#334155" opacity="0.8" />
                  {/* Door divider line */}
                  <line x1="31.5" y1="5.2" x2="31.5" y2="19.5" stroke="#d1d5db" strokeWidth="0.3" opacity="0.4" />
                  {/* Shoulder line — sharp crease running along the body */}
                  <path d="M 6 10.5 L 14 8.5 L 25 7 L 35 7.5 L 50 9 L 58 11" stroke="#d1d5db" strokeWidth="0.4" fill="none" opacity="0.6" />
                  {/* Blue EV accent stripe — bold line along lower body (Nexon EV signature) */}
                  <path d="M 8 14 L 15 12.5 L 25 11.5 L 35 11.5 L 45 12 L 52 13" stroke="#3b82f6" strokeWidth="1.2" strokeLinecap="round" fill="none" opacity="0.85" />
                  {/* Headlight — projector with DRL surround */}
                  <path d="M 3.5 12 L 7 10.5 L 8.5 11.5 L 5 13.5 Z" fill="#e2e8f0" opacity="0.95" />
                  <path d="M 4 12.5 L 6.5 11.2 L 7.5 12 L 5.5 13 Z" fill="#fbbf24" opacity="0.5" />
                  {/* Front bumper — tri-arrow pattern hint */}
                  <path d="M 2.5 15 L 4 13.5 L 5 14 L 3.5 15.5 Z" fill="#94a3b8" opacity="0.3" />
                  <path d="M 3 16 L 4.5 14.5 L 5.5 15 L 4 16.5 Z" fill="#94a3b8" opacity="0.25" />
                  {/* Fog light area */}
                  <path d="M 3 17.5 L 5 16.5 L 6 17 L 4 18 Z" fill="#475569" opacity="0.4" />
                  {/* Tail light — connected wraparound LED bar (Nexon style) */}
                  <path d="M 58 11 L 60 12.5 L 61 14.5 L 61 17 L 60.5 18.5 L 59.5 18 L 60 16 L 60 14 L 59 12 Z" fill="#ef4444" opacity="0.85" />
                  <path d="M 58.5 12 L 59.5 13 L 59.5 16 L 59 17" stroke="#ff6b6b" strokeWidth="0.3" fill="none" opacity="0.6" />
                  {/* Rear spoiler — subtle lip */}
                  <path d="M 49 2.8 L 51 3 L 51.8 4 L 50 4 Z" fill="#334155" />
                  {/* Rear bumper reflector */}
                  <rect x="58" y="17.5" width="2" height="0.6" rx="0.2" fill="#ef4444" opacity="0.4" />
                  {/* Front wheel arch — muscular flared */}
                  <path d="M 8 19.5 L 7.5 17 Q 10 13 16.5 13 Q 22 13 24 17 L 24 19.5" fill="#1e293b" stroke="#1e293b" strokeWidth="0.5" />
                  {/* Front wheel — 16" diamond-cut dual-tone alloy */}
                  <circle cx="16" cy="20" r="4.2" fill="#0a0a1a" />
                  <circle cx="16" cy="20" r="3.5" fill="#0f172a" stroke="#78716c" strokeWidth="0.4" />
                  {/* 5-spoke diamond-cut alloy pattern */}
                  <g opacity="0.7">
                    <line x1="16" y1="17" x2="16" y2="23" stroke="#a8a29e" strokeWidth="0.6" />
                    <line x1="13.2" y1="18.3" x2="18.8" y2="21.7" stroke="#a8a29e" strokeWidth="0.6" />
                    <line x1="13.2" y1="21.7" x2="18.8" y2="18.3" stroke="#a8a29e" strokeWidth="0.6" />
                    <line x1="14" y1="17.5" x2="18" y2="22.5" stroke="#a8a29e" strokeWidth="0.5" />
                    <line x1="14" y1="22.5" x2="18" y2="17.5" stroke="#a8a29e" strokeWidth="0.5" />
                  </g>
                  <circle cx="16" cy="20" r="1.2" fill="#334155" stroke="#a8a29e" strokeWidth="0.3" />
                  {/* Rear wheel arch — muscular flared */}
                  <path d="M 41 19.5 L 40.5 17 Q 43 13 49 13 Q 54 13 56.5 17 L 56.5 19.5" fill="#1e293b" stroke="#1e293b" strokeWidth="0.5" />
                  {/* Rear wheel — matching alloy */}
                  <circle cx="48.5" cy="20" r="4.2" fill="#0a0a1a" />
                  <circle cx="48.5" cy="20" r="3.5" fill="#0f172a" stroke="#78716c" strokeWidth="0.4" />
                  <g opacity="0.7">
                    <line x1="48.5" y1="17" x2="48.5" y2="23" stroke="#a8a29e" strokeWidth="0.6" />
                    <line x1="45.7" y1="18.3" x2="51.3" y2="21.7" stroke="#a8a29e" strokeWidth="0.6" />
                    <line x1="45.7" y1="21.7" x2="51.3" y2="18.3" stroke="#a8a29e" strokeWidth="0.6" />
                    <line x1="46.5" y1="17.5" x2="50.5" y2="22.5" stroke="#a8a29e" strokeWidth="0.5" />
                    <line x1="46.5" y1="22.5" x2="50.5" y2="17.5" stroke="#a8a29e" strokeWidth="0.5" />
                  </g>
                  <circle cx="48.5" cy="20" r="1.2" fill="#334155" stroke="#a8a29e" strokeWidth="0.3" />
                  {/* EV badge on front fender */}
                  <rect x="10" y="9.5" width="3.2" height="1.3" rx="0.3" fill="#3b82f6" opacity="0.85" />
                  <text x="11.6" y="10.6" textAnchor="middle" fill="#fff" fontSize="0.9" fontWeight="700">EV</text>
                  {/* Ground line — subtle shadow */}
                  <ellipse cx="32" cy="24" rx="28" ry="0.8" fill="#000" opacity="0.15" />
                </g>
                {/* Status label below */}
                {liveLocation.status && (
                  <text y={16 / transform.k} textAnchor="middle" fill="#fff" fontSize={8 / transform.k} fontWeight={600} opacity={0.9}>
                    {liveLocation.status === 'driving' ? 'Driving' : liveLocation.status === 'charging' ? 'Charging' : 'Parked'}
                    {liveLocation.soc !== null && liveLocation.soc !== undefined ? ` · ${liveLocation.soc}%` : ''}
                  </text>
                )}
              </g>
            );
          })()}
        </g>
      </svg>

      {/* Tooltip */}
      {tooltip && (
        <div style={{ position: "fixed", left: tooltip.x + 12, top: tooltip.y - 40, background: "rgba(17,24,39,0.95)", border: "1px solid #374151", borderRadius: 8, padding: "8px 12px", pointerEvents: "none", zIndex: 1000, maxWidth: 260 }}>
          <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 3 }}>{tooltip.name}</div>
          <div style={{ fontSize: 10, color: "#9ca3af" }}>{tooltip.dist.toLocaleString()} km · {tooltip.charges} charges · {tooltip.eff} Wh/km</div>
        </div>
      )}

      {/* Legend */}
      <div style={{ position: "absolute", top: 60, right: 10, background: "rgba(17,24,39,0.95)", border: "1px solid #374151", borderRadius: 10, padding: 12, maxHeight: "calc(100vh - 100px)", overflowY: "auto", width: 215, zIndex: 500 }}>
        <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>Trips</div>
        {ROUTES.map((r, i) => (
          <div key={i}>
            <div
              onClick={() => setSelected(selected === i ? null : i)}
              style={{
                display: "flex", alignItems: "center", gap: 7, padding: "5px 4px", borderRadius: 5, cursor: "pointer",
                background: selected === i ? "rgba(59,130,246,0.15)" : "transparent",
                transition: "background 0.15s"
              }}
              onMouseEnter={() => setHovered(i)}
              onMouseLeave={() => setHovered(null)}
            >
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: r.color, flexShrink: 0 }} />
              <span style={{ fontSize: 11, lineHeight: 1.3 }}>{r.name.length > 26 ? r.name.substring(0, 26) + "…" : r.name}</span>
            </div>
            <div style={{ fontSize: 9, color: "#6b7280", marginLeft: 15, marginBottom: 2 }}>
              {r.dist.toLocaleString()} km · {r.eff} Wh/km
            </div>
          </div>
        ))}
      </div>

      {/* Stats bar */}
      <div style={{ position: "absolute", bottom: 16, left: 12, background: "rgba(17,24,39,0.95)", border: "1px solid #374151", borderRadius: 10, padding: "10px 16px", display: "flex", gap: 20, zIndex: 500 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700 }}>{totalDist.toLocaleString()} <span style={{ fontSize: 10, color: "#6b7280" }}>km</span></div>
          <div style={{ fontSize: 9, color: "#6b7280" }}>Total Distance</div>
        </div>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700 }}>{totalCharges}</div>
          <div style={{ fontSize: 9, color: "#6b7280" }}>Charge Sessions</div>
        </div>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700 }}>11</div>
          <div style={{ fontSize: 9, color: "#6b7280" }}>Trips</div>
        </div>
      </div>

      {/* Zoom hint */}
      <div style={{ position: "absolute", bottom: 16, right: 240, fontSize: 9, color: "#4b5563", zIndex: 500 }}>
        Scroll to zoom · Click trip to isolate · Click background to reset
      </div>
    </div>
  );

const COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#14b8a6'];

function RouteMap({ selectedTrip, onSelectTrip }) {
  const allPts = TRIP_ROUTES.flat();
  if (!allPts.length) return <div className="text-gray-500 text-center p-8">No GPS data</div>;
  const lats = allPts.map(p => p.lat);
  const lons = allPts.map(p => p.lon);
  const minLat = Math.min(...lats) - 0.3, maxLat = Math.max(...lats) + 0.3;
  const minLon = Math.min(...lons) - 0.3, maxLon = Math.max(...lons) + 0.3;
  const W = 600, H = 500;
  const project = (lat, lon) => {
    const x = ((lon - minLon) / (maxLon - minLon)) * (W - 40) + 20;
    const y = (1 - (lat - minLat) / (maxLat - minLat)) * (H - 40) + 20;
    return [x, y];
  };

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'100%',background:'#0c0e14',borderRadius:8}}>
      {TRIP_ROUTES.map((pts, ti) => {
        if (pts.length < 2) return null;
        const isSelected = selectedTrip === null || selectedTrip === ti;
        const opacity = selectedTrip === null ? 0.7 : (isSelected ? 1 : 0.1);
        const color = COLORS[ti % COLORS.length];
        const projected = pts.map(p => project(p.lat, p.lon));
        const pathD = projected.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
        return (
          <g key={ti} style={{cursor:'pointer'}} onClick={() => onSelectTrip(ti === selectedTrip ? null : ti)}>
            <path d={pathD} fill="none" stroke={color} strokeWidth={isSelected && selectedTrip !== null ? 2.5 : 1.5} opacity={opacity} strokeLinejoin="round" strokeLinecap="round" />
            {isSelected && selectedTrip !== null && (() => {
              const first = pts[0];
              const last = pts[pts.length - 1];
              const [fx, fy] = project(first.lat, first.lon);
              const [lx, ly] = project(last.lat, last.lon);
              return <>
                <circle cx={fx} cy={fy} r={5} fill={color} stroke="#fff" strokeWidth={1.5} />
                <circle cx={lx} cy={ly} r={5} fill={color} stroke="#fff" strokeWidth={1.5} />
                {first.loc && <text x={fx} y={fy - 10} fill="#fff" fontSize="9" textAnchor="middle" fontWeight="600">{(first.loc && first.loc.split(',')[0])}</text>}
                {last.loc && <text x={lx} y={ly + 14} fill="#fff" fontSize="9" textAnchor="middle" fontWeight="600">{(last.loc && last.loc.split(',')[0])}</text>}
              </>;
            })()}
          </g>
        );
      })}
      {selectedTrip === null && TRIP_ROUTES.map((pts, ti) => {
        if (!pts.length) return null;
        const [x, y] = project(pts[0].lat, pts[0].lon);
        return <circle key={`s${ti}`} cx={x} cy={y} r={4} fill={COLORS[ti%COLORS.length]} stroke="#fff" strokeWidth={1} />;
      })}
    </svg>
  );
}

function KPI({ value, unit, label }) {
  return (
    <div className="bg-gray-900 border border-gray-800 rounded-xl p-4 text-center">
      <div className="text-2xl font-bold text-white">{value} <span className="text-sm font-normal text-gray-400">{unit}</span></div>
      <div className="text-xs text-gray-400 mt-1">{label}</div>
    </div>
  );
}

function CustomTooltip({ active, payload, label, formatter }) {
  if (!active || !(payload && payload.length)) return null;
  return (
    <div className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs">
      <div className="text-gray-300 font-medium mb-1">{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{color: p.color || p.fill}}>
          {p.name}: {formatter ? formatter(p.value) : p.value}
        </div>
      ))}
    </div>
  );
}

    const totalCharged = TRIP_DATA.reduce((s,t) => s + (t.totalKwhCharged||0), 0);

    const totalLegs = TRIP_DATA.reduce((s,t) => s + ((t.legs && t.legs.length)||0), 0);
    const eff = totalDist > 0 ? (totalUsed * 1000 / totalDist) : 0;

    let fastC=0, slowC=0, fastKwh=0, slowKwh=0;

    TRIP_DATA.forEach(t => (t.charges||[]).forEach(c => { if(c.location) uniqueStations.add(c.location) }));

          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-semibold text-white">
              Charging Stations {selectedTrip !== null ? `(Trip ${selectedTrip+1})` : '(All Trips)'}
            </h2>
            <button onClick={() => setShowStations(!showStations)}
              className="text-xs text-blue-400 hover:text-blue-300 transition-colors">
              {showStations ? 'Hide' : `Show ${stationsList.length} stations`}
            </button>
          </div>
          {showStations && (
            <div style={{maxHeight:400,overflowY:'auto'}}>
              <table className="w-full text-xs">
                <thead>
                  <tr className="text-gray-500 border-b border-gray-800">
                    <th className="text-left pb-2 pr-4">Station</th>
                    <th className="text-left pb-2 pr-4">Address</th>
                    <th className="text-center pb-2 pr-4">Type</th>
                    <th className="text-right pb-2 pr-4">kWh</th>
                    <th className="text-right pb-2">Time</th>
                  </tr>
                </thead>
                <tbody>
                  {stationsList.map((s, i) => (
                    <tr key={i} className="border-b border-gray-800/50 hover:bg-gray-800/30">
                      <td className="py-1.5 pr-4 text-gray-200 font-medium" style={{maxWidth:200}}>{s.name}</td>
                      <td className="py-1.5 pr-4 text-gray-500 truncate" style={{maxWidth:200}}>{s.addr}</td>
                      <td className="py-1.5 pr-4 text-center">
                        <span className={`px-1.5 py-0.5 rounded text-xs ${s.type==='fast' ? 'bg-yellow-900/50 text-yellow-400' : 'bg-emerald-900/50 text-emerald-400'}`}>
                          {s.type==='fast' ? 'DC' : 'AC'}
                        </span>
                      </td>
                      <td className="py-1.5 pr-4 text-right text-gray-300">{s.kwh}</td>
                      <td className="py-1.5 text-right text-gray-500">{(s.time && s.time.substring(5,16))}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>

        <div className="grid grid-cols-2 gap-5 mb-6">
          <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 className="text-sm font-semibold text-white mb-3">Efficiency by Trip (Wh/km)</h2>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={effData} margin={{left:0,right:10,top:5,bottom:60}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" />
                <XAxis dataKey="name" tick={{fill:'#9ca3af',fontSize:10}} angle={-40} textAnchor="end" interval={0} />
                <YAxis tick={{fill:'#9ca3af'}} />
                <Tooltip content={<CustomTooltip formatter={v => (v && v.toFixed(1))+' Wh/km'} />} />
                <Bar dataKey="whPerKm" radius={[4,4,0,0]}>
                  {effData.map((e,i) => <Cell key={i} fill={e.fill} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 className="text-sm font-semibold text-white mb-3">Energy Balance</h2>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={energyData} margin={{left:0,right:10,top:5,bottom:60}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" />
                <XAxis dataKey="name" tick={{fill:'#9ca3af',fontSize:10}} angle={-40} textAnchor="end" interval={0} />
                <YAxis tick={{fill:'#9ca3af'}} />
                <Tooltip content={<CustomTooltip formatter={v => (v && v.toFixed(1))+' kWh'} />} />
                <Bar dataKey="used" name="Used" fill="#ef4444" opacity={0.7} radius={[4,4,0,0]} />
                <Bar dataKey="charged" name="Charged" fill="#10b981" opacity={0.7} radius={[4,4,0,0]} />
                <Legend wrapperStyle={{fontSize:12,color:'#9ca3af'}} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-5 mb-6">
          <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 className="text-sm font-semibold text-white mb-3">Distance per Trip (km)</h2>
            <ResponsiveContainer width="100%" height={300}>
              <BarChart data={distData} layout="vertical" margin={{left:120,right:20,top:5,bottom:5}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" />
                <XAxis type="number" tick={{fill:'#9ca3af'}} />
                <YAxis dataKey="name" type="category" tick={{fill:'#9ca3af',fontSize:11}} width={110} />
                <Tooltip content={<CustomTooltip formatter={v => (v && v.toLocaleString())+' km'} />} />
                <Bar dataKey="dist" radius={[0,4,4,0]}>
                  {distData.map((e,i) => <Cell key={i} fill={e.fill} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <h2 className="text-sm font-semibold text-white mb-3">Charging Summary</h2>
            <div className="grid grid-cols-2 gap-3 mb-4">
              <div className="bg-gray-800/50 rounded-lg p-3 text-center">
                <div className="text-2xl font-bold text-yellow-400">{totals.fastC}</div>
                <div className="text-xs text-gray-400">Fast (DC)</div>
              </div>
              <div className="bg-gray-800/50 rounded-lg p-3 text-center">
                <div className="text-2xl font-bold text-emerald-400">{totals.slowC}</div>
                <div className="text-xs text-gray-400">Slow (AC)</div>
              </div>
              <div className="bg-gray-800/50 rounded-lg p-3 text-center">
                <div className="text-2xl font-bold text-yellow-400">{totals.fastKwh.toFixed(0)} <span className="text-sm font-normal text-gray-400">kWh</span></div>
                <div className="text-xs text-gray-400">Fast Energy</div>
              </div>
              <div className="bg-gray-800/50 rounded-lg p-3 text-center">
                <div className="text-2xl font-bold text-emerald-400">{totals.slowKwh.toFixed(0)} <span className="text-sm font-normal text-gray-400">kWh</span></div>
                <div className="text-xs text-gray-400">Slow Energy</div>
              </div>
            </div>
            <ResponsiveContainer width="100%" height={140}>
              <PieChart>
                <Pie data={pieData} dataKey="value" cx="50%" cy="50%" innerRadius={35} outerRadius={60} paddingAngle={3}>
                  {pieData.map((e,i) => <Cell key={i} fill={e.color} />)}
                </Pie>
                <Tooltip formatter={v => v+' kWh'} contentStyle={{background:'#111827',border:'1px solid #374151',borderRadius:8,fontSize:12}} />
                <Legend wrapperStyle={{fontSize:11}} />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-6">
          <h2 className="text-sm font-semibold text-white mb-3">Leg Efficiency vs Distance</h2>
          <ResponsiveContainer width="100%" height={350}>
            <ScatterChart margin={{left:10,right:20,top:10,bottom:10}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" />
              <XAxis dataKey="x" name="Distance" unit=" km" tick={{fill:'#9ca3af'}} />
              <YAxis dataKey="y" name="Wh/km" unit=" Wh/km" tick={{fill:'#9ca3af'}} />
              <Tooltip content={({active,payload}) => {
                if(!active||!(payload && payload.length)) return null;
                const d=payload[0].payload;
                return <div className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-gray-200">
                  <div className="font-medium">{d.from} → {d.to}</div>
                  <div>{d.x} km | {d.y.toFixed(0)} Wh/km</div>
                </div>;
              }} />
              {TRIP_DATA.map((t,ti) => {
                const pts = scatterData.filter(s=>s.trip===ti);
                if(!pts.length) return null;
                return <Scatter key={ti} name={((t.meta && t.meta.notes)||'').substring(0,18)} data={pts} fill={COLORS[ti%COLORS.length]} />;
              })}
              <Legend wrapperStyle={{fontSize:10,color:'#9ca3af'}} />
            </ScatterChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

    
    // ===== MAIN APP COMPONENT =====
    function App() {
      const [activeTab, setActiveTab] = useState('map');
      const [tripsData, setTripsData] = useState(null);
      const [liveLocation, setLiveLocation] = useState({latitude:17.75,longitude:83.35,timestamp:"2026-03-07T15:30:00Z",speed:62,soc:54,odometer:86515,status:"driving",heading:45,address:"Vizag, AP"});
      const [lastUpdate, setLastUpdate] = useState(new Date());
      const [loading, setLoading] = useState(true);
      
      // Load trip data
      useEffect(() => {
        fetch('./data/ev_trips.json')
          .then(r => r.json())
          .then(data => { setTripsData(data); setLoading(false); })
          .catch(e => { console.error('Failed to load trips:', e); setLoading(false); });
      }, []);
      
      // Poll live location every 30 seconds
      useEffect(() => {
        const fetchLocation = () => {
          if (document.hidden) return;
          fetch('./data/live_location.json?' + Date.now())
            .then(r => r.json())
            .then(data => {
              if (data.latitude && data.longitude) {
                setLiveLocation(data);
                setLastUpdate(new Date());
              }
            })
            .catch(() => {});
        };
        
        fetchLocation();
        const interval = setInterval(fetchLocation, 30000);
        
        const handleVisibility = () => { if (!document.hidden) fetchLocation(); };
        document.addEventListener('visibilitychange', handleVisibility);
        
        return () => {
          clearInterval(interval);
          document.removeEventListener('visibilitychange', handleVisibility);
        };
      }, []);
      
      if (loading) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: '100vw', height: '100vh', background: '#0a0b0f', color: '#6b7280' }}>
            Loading trip data...
          </div>
        );
      }
      
      const timeAgo = lastUpdate ? Math.round((Date.now() - lastUpdate) / 1000) : null;
      
      return (
        <div style={{ width: '100vw', height: '100vh', display: 'flex', flexDirection: 'column', background: '#0a0b0f' }}>
          {/* Header */}
          <div style={{ 
            background: 'linear-gradient(135deg, #1e293b 0%, #0f172a 100%)', 
            borderBottom: '1px solid #1f2937', 
            padding: '10px 20px', 
            display: 'flex', 
            alignItems: 'center', 
            justifyContent: 'space-between',
            height: 52,
            flexShrink: 0
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 16, fontWeight: 700, color: '#fff' }}>Tata Nexon EV Tracker</span>
              <span style={{ background: '#2563eb', color: '#fff', fontSize: 10, padding: '2px 8px', borderRadius: 10, fontWeight: 600 }}>29 kWh</span>
              <span style={{ color: '#6b7280', fontSize: 11 }}>Dec 2025 — Mar 2026</span>
            </div>
            
            {/* Tab buttons */}
            <div style={{ display: 'flex', gap: 4 }}>
              {[['map', 'Route Map'], ['dashboard', 'Dashboard']].map(([key, label]) => (
                <button 
                  key={key}
                  onClick={() => setActiveTab(key)}
                  style={{
                    padding: '6px 16px', border: 'none', borderRadius: 6, cursor: 'pointer',
                    background: activeTab === key ? '#3b82f6' : 'rgba(255,255,255,0.08)',
                    color: activeTab === key ? '#fff' : '#94a3b8',
                    fontSize: 12, fontWeight: 600, transition: 'all 0.2s'
                  }}
                >{label}</button>
              ))}
            </div>
            
            {/* Live indicator */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {liveLocation ? (
                <>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#22c55e', animation: 'livePulse 1.5s infinite' }} />
                  <span style={{ fontSize: 11, color: '#94a3b8' }}>
                    {liveLocation.status === 'driving' ? 'Driving' : liveLocation.status === 'charging' ? 'Charging' : 'Parked'}
                    {liveLocation.address ? ` · ${liveLocation.address}` : ''}
                    {timeAgo !== null ? ` · ${timeAgo}s ago` : ''}
                  </span>
                </>
              ) : (
                <>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#6b7280' }} />
                  <span style={{ fontSize: 11, color: '#6b7280' }}>Offline</span>
                </>
              )}
            </div>
          </div>
          
          {/* Content */}
          <div style={{ flex: 1, overflow: 'hidden' }}>
            {activeTab === 'map' && <EVRouteMap liveLocation={liveLocation} />}
            {activeTab === 'dashboard' && <EVDashboard />}
          </div>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
